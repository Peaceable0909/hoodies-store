<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cart — HOODIES</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>

<nav class="nav">
  <a href="index.html" class="nav-logo">Hoodies</a>
  <div class="nav-links">
    <a href="catalog.html">Catalog</a>
    <a href="design.html">Design Your Own</a>
    <a href="closet.html">My Closet</a>
  </div>
  <div class="nav-right">
    <a href="cart.html" class="nav-icon-btn active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span class="cart-badge">0</span>
    </a>
  </div>
</nav>

<div class="cart-page">
  <div class="cart-items-col">
    <div class="cart-header"><h1>Your Cart</h1></div>
    <div id="cart-list"></div>
  </div>
  <div class="cart-summary-col">
    <h3>ORDER SUMMARY</h3>
    <div id="cart-summary"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/config.js"></script>
<script src="js/db.js"></script>
<script>
  function render() {
    const cart = getCart();
    const cur  = getCurrency();
    updateCartBadge();

    const list = document.getElementById('cart-list');
    const sum  = document.getElementById('cart-summary');

    if (!cart.length) {
      list.innerHTML = `<div class="empty-cart"><h2>Your cart is empty</h2><p>Browse our catalog and add something you love.</p><a href="catalog.html" class="btn btn-purple" style="margin-top:1rem">Shop Now</a></div>`;
      sum.innerHTML  = '<p style="font-size:0.82rem;color:var(--gray)">Add items to see your summary.</p>';
      return;
    }

    let total = 0;
    list.innerHTML = cart.map((item, i) => {
      total += item.subtotal_ngn;
      return `<div class="cart-item">
        <div class="cart-item-img">
          ${item.image_url ? `<img src="${item.image_url}" alt="${item.name}"/>` : ''}
        </div>
        <div>
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-meta">
            Size: ${item.size||'—'}<br>
            Color: <span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:${item.color||'#ccc'};vertical-align:middle;border:1px solid rgba(0,0,0,0.1)"></span><br>
            Qty: ${item.qty}
            ${item.measurements?.chest ? `<br>Chest: ${item.measurements.chest}"` : ''}
          </div>
          <button class="cart-item-remove" onclick="removeCartItem(${i});render()">Remove</button>
        </div>
        <div class="cart-item-price">${fmtPrice(item.subtotal_ngn, cur)}</div>
      </div>`;
    }).join('');

    sum.innerHTML = `
      <div class="summary-row"><span>Subtotal</span><span>${fmtPrice(total, cur)}</span></div>
      <div class="summary-row"><span>Shipping</span><span>Free</span></div>
      <div class="summary-row"><span>Tax</span><span>Included</span></div>
      <div class="summary-row total"><span>Total</span><span>${fmtPrice(total, cur)}</span></div>
      <div style="margin-top:1.5rem;display:flex;flex-direction:column;gap:0.75rem">
        <a href="checkout.html" class="btn btn-yellow btn-full btn-lg">Proceed to Checkout</a>
        <a href="catalog.html" class="btn btn-ghost btn-full">Continue Shopping</a>
      </div>`;
  }

  render();
</script>
</body>
</html>
